<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Need for Speed - Balapan Indonesia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS tambahan untuk highscore */
        .stat-card.highlight {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-left-color: #fff;
        }
        .stat-card.highlight .stat-value {
            color: #1a1a1a;
            text-shadow: none;
        }
        .stat-card.highlight .stat-label {
            color: #1a1a1a;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="game-container">
        <div class="dashboard">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">🏁 POSISI</div>
                    <div class="stat-value" id="pos">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">⭐ SKOR</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">⚡ SPEED</div>
                    <div class="stat-value" id="speed">3</div>
                </div>
                <div class="stat-card" id="shieldCard">
                    <div class="stat-label">🛡️ SHIELD</div>
                    <div class="stat-value" id="shieldTime">0</div>
                </div>
                <div class="stat-card" id="livesCard">
                    <div class="stat-label">❤️ NYAWA</div>
                    <div class="stat-value" id="livesValue">3</div>
                </div>
                <div class="stat-card highlight" id="highscoreCard">
                    <div class="stat-label">🏆 HIGHSCORE</div>
                    <div class="stat-value" id="highscore">0</div>
                </div>
            </div>
            <div class="button-group">
                <select id="levelSelect" class="level-select">
                    <option value="easy">🟢 EASY</option>
                    <option value="medium" selected>🟡 MEDIUM</option>
                    <option value="hard">🔴 HARD</option>
                </select>
                <button id="pauseBtn" class="pause-btn" style="display:none;">⏸️ PAUSE</button>
                <button id="resetBtn" style="display:none;">🔄 RESET</button>
            </div>
        </div>
        <canvas id="raceCanvas"></canvas>
    </div>
</div>

<div class="start-overlay" id="startOverlay">
    <div class="start-card">
        <h1>🏍️ NEED FOR SPEED 🏍️</h1>
        <p>🏍️ Motor Trail vs Musuh!</p>
        <p>🚓 DAMKAR agresif suka nyrempet | ❤️ 3 nyawa</p>
        <p>🛡️ Shield | ⚡ Kecepatan naik tiap 5 musuh</p>
        <p>🏆 Highscore tersimpan otomatis di browser</p>
        <div class="level-selection">
            <label>Pilih Level:</label>
            <div class="level-options">
                <button class="level-opt easy" data-level="easy">🟢 EASY</button>
                <button class="level-opt medium" data-level="medium">🟡 MEDIUM</button>
                <button class="level-opt hard" data-level="hard">🔴 HARD</button>
            </div>
        </div>
        <button class="start-btn" id="startBtn">🏁 START RACE 🏁</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
